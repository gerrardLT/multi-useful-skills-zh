  type: component
  path: skills\storyboard\SKILL.md
  intent: Create a 6-frame visual narrative that tells the story of a user's journey
    from problem to solution, using the classic storytelling arc to build empathy,
    illustrate value, and make abstract product concepts concrete. Use this to align
    stakeholders, pitch features, communicate vision, or test if your solution resonates
    emotionally before building it.
- name: tam-sam-som-calculator
  description: "\u5E26\u7740\u6E05\u6670\u5047\u8BBE\u3001\u65B9\u6CD5\u548C caveat\
    \ \u8BA1\u7B97 TAM\u3001SAM \u548C SOM\u3002\u9002\u7528\u4E8E\u4E3A\u4EA7\u54C1\
    \u60F3\u6CD5\u3001\u5546\u4E1A\u8BBA\u8BC1\u6216\u9AD8\u5C42\u8BC4\u5BA1\u505A\
    \u5E02\u573A\u89C4\u6A21\u4F30\u7B97\u3002"
  type: interactive
  path: skills\tam-sam-som-calculator\SKILL.md
  intent: "Guide product managers through calculating Total Addressable Market (TAM),\
    \ Serviceable Available Market (SAM), and Serviceable Obtainable Market (SOM)\
    \ for a product idea by asking adaptive, contextually relevant questions. Use\
    \ this to build defensible market size estimates backed by real-world citations,\
    \ economic projections, and population data\u9225\u6505ssential for pitching to\
    \ investors, securing budget, or validating product-market fit."
- name: user-story
  description: "\u4F7F\u7528 Mike Cohn \u683C\u5F0F\u548C Gherkin acceptance criteria\
    \ \u521B\u5EFA user story\u3002\u9002\u7528\u4E8E\u628A\u7528\u6237\u9700\u6C42\
    \u8F6C\u5316\u4E3A\u53EF\u5F00\u53D1\u3001\u76EE\u6807\u6E05\u6670\u4E14\u53EF\
    \u6D4B\u8BD5\u7684\u5DE5\u4F5C\u9879\u3002"
  type: component
  path: skills\user-story\SKILL.md
  intent: Create clear, concise user stories that combine Mike Cohn's user story format
    with Gherkin-style acceptance criteria. Use this to translate user needs into
    actionable development work that focuses on outcomes, ensures shared understanding
    between product and engineering, and provides testable success criteria.
- name: user-story-mapping
  description: "\u521B\u5EFA\u7528\u6237\u6545\u4E8B\u5730\u56FE\uFF0C\u6392\u51FA\
    \u6D3B\u52A8\u3001\u6B65\u9AA4\u3001\u4EFB\u52A1\u548C\u53D1\u5E03\u5207\u7247\
    \u3002\u9002\u7528\u4E8E\u56F4\u7ED5\u7528\u6237\u65C5\u7A0B\u89C4\u5212 workflow\u3001\
    backlog \u6216 MVP\u3002"
  type: component
  path: skills\user-story-mapping\SKILL.md
  intent: Visualize the user journey by creating a hierarchical map that breaks down
    high-level activities into steps and tasks, organized left-to-right as a narrative
    flow. Use this to build shared understanding across product, design, and engineering,
    prioritize features based on user workflows, and identify gaps or opportunities
    in the user experience.
- name: user-story-mapping-workshop
  description: "\u901A\u8FC7\u81EA\u9002\u5E94\u63D0\u95EE\u548C\u7ED3\u6784\u5316\
    \u5730\u56FE\u8F93\u51FA\u8FD0\u884C\u7528\u6237\u6545\u4E8B\u6620\u5C04\u5DE5\
    \u4F5C\u574A\u3002\u9002\u7528\u4E8E\u4E3A\u67D0\u4E2A workflow \u68B3\u7406 backbone\
    \ activity\u3001task \u548C release slice\u3002"
  type: interactive
  path: skills\user-story-mapping-workshop\SKILL.md
  intent: "Guide product managers through creating a user story map by asking adaptive\
    \ questions about the system, users, workflow, and priorities\u9225\u6516hen generating\
    \ a two-dimensional map with backbone (activities), user tasks, and release slices.\
    \ Use this to move from flat backlogs to visual story maps that communicate the\
    \ big picture, identify missing functionality, and enable meaningful release planning\u9225\
    \u6501voiding \"context-free mulch\" where stories lose connection to the overall\
    \ system narrative."
- name: user-story-splitting
  description: "\u7528\u6210\u719F\u7684\u62C6\u5206\u6A21\u5F0F\uFF0C\u628A\u5927\
    \ story \u6216 epic \u62C6\u6210\u66F4\u5C0F\u3001\u53EF\u4EA4\u4ED8\u7684 story\u3002\
    \u9002\u7528\u4E8E backlog \u9879\u8FC7\u5927\uFF0C\u96BE\u4EE5\u4F30\u7B97\u3001\
    \u6392\u5E8F\u6216\u72EC\u7ACB\u53D1\u5E03\u65F6\u3002"
  type: component
  path: skills\user-story-splitting\SKILL.md
  intent: Break down large user stories, epics, or features into smaller, independently
    deliverable stories using systematic splitting patterns. Use this to make work
    more manageable, reduce risk, enable faster feedback cycles, and maintain flow
    in agile development. This skill applies to user stories, epics, and any work
    that's too large to complete in a single sprint.
