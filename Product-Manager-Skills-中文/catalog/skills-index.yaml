    \u5230\u6B8B\u9177\u771F\u76F8\u7684\u65F6\u5019\u3002"
  type: component
  path: skills\pol-probe\SKILL.md
  intent: "Define and document a **Proof of Life (PoL) probe**\u9225\u6501 lightweight,\
    \ disposable validation artifact designed to surface harsh truths before expensive\
    \ development. Use this when you need to eliminate a specific risk or test a narrow\
    \ hypothesis **without building production-quality software**. PoL probes are\
    \ reconnaissance missions, not MVPs\u9225\u6516hey're meant to be deleted, not\
    \ scaled."
- name: pol-probe-advisor
  description: Select the right Proof of Life (PoL) probe based on hypothesis, risk,
    and resources. Use this to match the validation method to the real learning goal,
    not tooling comfort.
  type: interactive
  path: skills\pol-probe-advisor\SKILL.md
  intent: "Guide product managers through selecting the right **Proof of Life (PoL)\
    \ probe** type (of 5 flavors) based on their hypothesis, risk, and available resources.\
    \ Use this when you need to eliminate a specific risk or test a narrow hypothesis,\
    \ but aren't sure which validation method to use. This interactive skill ensures\
    \ you match the cheapest prototype to the harshest truth\u9225\u650Fot the prototype\
    \ you're most comfortable building."
- name: positioning-statement
  description: "\u521B\u5EFA Geoffrey Moore \u98CE\u683C\u7684\u5B9A\u4F4D\u9648\u8FF0\
    \u3002\u9002\u7528\u4E8E\u6F84\u6E05\u670D\u52A1\u5BF9\u8C61\u3001\u8981\u89E3\
