- name: storyboard
  description: "\u521B\u5EFA\u4E00\u4E2A\u516D\u683C storyboard\uFF0C\u5C55\u793A\u7528\
    \u6237\u4ECE\u95EE\u9898\u5230\u89E3\u51B3\u65B9\u6848\u7684\u65C5\u7A0B\u3002\
