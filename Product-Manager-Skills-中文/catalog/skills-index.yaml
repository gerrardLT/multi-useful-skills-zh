  path: skills\executive-onboarding-playbook\SKILL.md
  intent: "Structure the first 90 days of a VP or CPO transition as a diagnostic process,\
    \ not an execution sprint. The single most common failure in senior product leadership\
    \ transitions is acting before understanding \u9225?changing structures, replacing\
    \ people, or announcing strategy before building the evidence base that makes\
    \ those decisions defensible."
