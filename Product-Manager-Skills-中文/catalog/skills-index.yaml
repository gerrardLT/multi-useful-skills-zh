  path: skills\problem-framing-canvas\SKILL.md
  intent: "Guide product managers through the MITRE Problem Framing Canvas process\
    \ by asking structured questions across three phases: Look Inward (examine your\
    \ own assumptions and biases), Look Outward (understand who experiences the problem\
