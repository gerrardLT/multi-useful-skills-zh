    \u6C42\u3001\u91CD\u65B0\u5B9A\u4F4D\u4EA7\u54C1\uFF0C\u6216\u63D0\u5347 discovery\
    \ \u4E0E messaging\u3002"
  type: component
  path: skills\jobs-to-be-done\SKILL.md
  intent: "Systematically explore what customers are trying to accomplish (functional,\
    \ social, emotional jobs), the pains they experience, and the gains they seek.\
    \ Use this framework to uncover unmet needs, validate product ideas, and ensure\
    \ your solution addresses real motivations\u9225\u650Fot just surface-level feature\
    \ requests."
- name: lean-ux-canvas
  description: "\u5F15\u5BFC\u56E2\u961F\u5B8C\u6210 Lean UX Canvas v2\u3002\u9002\
    \u7528\u4E8E\u6846\u5B9A business problem\u3001\u66B4\u9732 assumptions\uFF0C\u5E76\
    \u5B9A\u4E49\u4E0B\u4E00\u6B65\u8BE5\u5B66\u4EC0\u4E48\u3002"
  type: interactive
  path: skills\lean-ux-canvas\SKILL.md
  intent: "Guide product managers through creating **Jeff Gothelf's Lean UX Canvas\
    \ (v2)**\u9225\u6501 one-page facilitation tool that frames work around a **business\
    \ problem to solve**, not a **solution to implement**. Use this to align cross-functional\
    \ teams around core assumptions, craft testable hypotheses, and ensure learning\
    \ happens every sprint by exposing gaps in understanding (problem, users, value,\
    \ and why the solution should work)."
- name: opportunity-solution-tree
  description: "\u4ECE outcomes \u5EF6\u5C55\u5230 opportunities\u3001solutions \u548C\
    \ tests\uFF0C\u6784\u5EFA Opportunity Solution Tree\u3002\u9002\u7528\u4E8E stakeholder\
    \ request \u8FD8\u9700\u8981\u5148\u505A problem framing \u65F6\u3002"
  type: interactive
  path: skills\opportunity-solution-tree\SKILL.md
  intent: "Guide product managers through creating an Opportunity Solution Tree (OST)\
