    or ICE for data-driven decisions). Outputs a recommended framework with implementation
    guidance tailored to your context.
- name: problem-framing-canvas
  description: "\u5F15\u5BFC\u56E2\u961F\u4F7F\u7528 MITRE \u7684 Problem Framing\
