- name: finance-based-pricing-advisor
  description: "\u7528 ARPU\u3001\u8F6C\u5316\u7387\u3001\u6D41\u5931\u98CE\u9669\u3001\
    NRR \u548C\u56DE\u672C\u5468\u671F\u8BC4\u4F30\u5B9A\u4EF7\u8C03\u6574\u3002\u9002\
