    \u8BE5\u4E0A\u7EBF\u3002"
  type: interactive
  path: skills\finance-based-pricing-advisor\SKILL.md
  intent: Evaluate the **financial impact** of pricing changes (price increases, new
    tiers, add-ons, discounts) using ARPU/ARPA analysis, conversion impact, churn
    risk, NRR effects, and CAC payback implications. Use this to make data-driven
    go/no-go decisions on proposed pricing changes with supporting math and risk assessment.
