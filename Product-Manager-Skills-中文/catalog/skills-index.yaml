    \u8981\u7ACB\u523B\u786E\u8BA4\u67D0\u4E2A\u6307\u6807\u5B9A\u4E49\u3001\u516C\
    \u5F0F\u6216 benchmark \u65F6\u3002"
  type: component
  path: skills\finance-metrics-quickref\SKILL.md
  intent: Quick reference for any SaaS finance metric without deep teaching. Use this
