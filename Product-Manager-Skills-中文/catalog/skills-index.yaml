    \ options (problems to solve), mapping potential solutions, and selecting the\
    \ best proof-of-concept (POC) based on feasibility, impact, and market fit. Use\
    \ this to move from vague product requests to structured discovery, ensuring teams\
    \ solve the right problems before jumping to solutions\u9225\u6501voiding \"feature\
    \ factory\" syndrome and premature convergence on ideas."
- name: pestel-analysis
